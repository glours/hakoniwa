# .golangci.yml — shared linter configuration for github.com/glours/hakoniwa
#
# Requires golangci-lint v2.
# Run with: golangci-lint run ./...
# Or via:   make lint

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck      # unchecked error return values
    - staticcheck   # broad static analysis (De Morgan, dead code, …)
    - unused        # identifiers that are never referenced
    - govet         # suspicious constructs (shadow, printf format, …)
  settings:
    errcheck:
      # _, _ = expr counts as "checked" — intentional ignore patterns pass.
      check-blank: false

formatters:
  enable:
    - gofmt         # formatting (moved from linters to formatters in v2)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
