# cross-review — Hakoniwa example (use case #2: fan-out + fan-in review)
#
# One producer agent generates an artifact, two independent reviewer agents
# evaluate it in parallel (fan-out), and a merger agent consolidates their
# feedback (fan-in):
#
#   producer ──artifact.ready──▶ reviewer-alpha ──review.alpha──▶ merger
#                             ▶ reviewer-beta  ──review.beta ──▶ merger
#
# Prerequisites
# -------------
# - sbx CLI installed and authenticated (docker login + sbx login)
# - Environment variables:
#     ANTHROPIC_API_KEY   — for claude agents (producer, merger)
#     OPENAI_API_KEY      — for codex agent (reviewer-alpha)
#     GOOGLE_API_KEY      — for gemini agent (reviewer-beta)
#
# Usage
# -----
#   hako plan           # preview the execution graph
#   hako up             # run the pipeline
#   hako ps             # check statuses
#   hako down           # clean up
#
# Expected output
# ---------------
# - producer writes its artifact to /root/.hako/out/artifact.ready.json
# - Each reviewer reads the artifact and writes its review to
#   /root/.hako/out/review.{alpha,beta}.json
# - merger reads both reviews from /root/.hako/in/ and writes the
#   consolidated output to /root/.hako/out/merged.json

name: cross-review

defaults:
  policy:
    default: balanced       # outbound HTTPS allowed; deny everything else
    allow_widening: false   # reviewers may not open additional egress paths

channels:
  - artifact.ready   # fired by producer
  - review.alpha     # fired by reviewer-alpha
  - review.beta      # fired by reviewer-beta

agents:

  producer:
    agent: claude
    resources: { cpus: 2, memory: 4096 }
    secrets:
      - { value: "${ANTHROPIC_API_KEY}", env: ANTHROPIC_API_KEY }
      - { value: "gh auth token",        env: GH_TOKEN, host: api.github.com, optional: true }
    policy:
      network:
        deny: ["*.telemetry.io"]
    emits: [artifact.ready]

  reviewer-alpha:
    agent: codex
    resources: { cpus: 2, memory: 4096 }
    secrets:
      - { value: "${OPENAI_API_KEY}", env: OPENAI_API_KEY }
    policy:
      network:
        deny: ["*.telemetry.io", "*.statsig.com"]
    depends_on:
      producer: { condition: on_event, channel: artifact.ready }
    subscribes: [artifact.ready]
    emits: [review.alpha]

  reviewer-beta:
    agent: gemini
    resources: { cpus: 2, memory: 4096 }
    secrets:
      - { value: "${GOOGLE_API_KEY}", env: GOOGLE_API_KEY }
    policy:
      network:
        deny: ["*.telemetry.io"]
    depends_on:
      producer: { condition: on_event, channel: artifact.ready }
    subscribes: [artifact.ready]
    emits: [review.beta]

  merger:
    agent: claude
    resources: { cpus: 2, memory: 4096 }
    secrets:
      - { value: "${ANTHROPIC_API_KEY}", env: ANTHROPIC_API_KEY }
    # Fan-in: merger waits for BOTH reviewers before starting.
    depends_on:
      reviewer-alpha: { condition: on_event, channel: review.alpha }
      reviewer-beta:  { condition: on_event, channel: review.beta }
    subscribes: [review.alpha, review.beta]
